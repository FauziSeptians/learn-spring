# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/your_database_name
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== H2 CONSOLE =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== SQL INIT =====
spring.sql.init.mode=always

# ===== LOGGING =====
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.absensi=DEBUG

# ===== SWAGGER =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
server.port=9090

# ===== SECURITY / JWT =====
# JWT Secret Key (minimal 256-bit / 32 karakter untuk HS256)
application.security.jwt.secret-key=your_super_secret_jwt_key_that_is_at_least_32_characters_long
# JWT Expiration (dalam milliseconds)
application.security.jwt.expiration=86400000
# Refresh Token Expiration (dalam milliseconds)
application.security.jwt.refresh-token.expiration=604800000

# ===== APP INFO & PROFILES =====
spring.application.name=absensi-app
spring.profiles.active=dev

# ===== DEVTOOLS =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Optional - exclude folder yang tidak perlu di-watch
spring.devtools.restart.exclude=static/**,public/**,templates/**

spring.jackson.serialization.write-dates-as-timestamps=false

# ===== RABBITMQ =====
spring.rabbitmq.host=your_rabbitmq_host_ip_or_domain
spring.rabbitmq.port=5672
spring.rabbitmq.username=your_rabbitmq_username
spring.rabbitmq.password=your_rabbitmq_password

# ===== MAIL / SMTP =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== REDIS CACHE =====
spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
