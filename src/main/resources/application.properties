# ===== H2 DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/learn-spring
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== H2 CONSOLE =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== SQL INIT =====
spring.sql.init.mode=always

# ===== LOGGING =====
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.absensi=DEBUG

# ===== SWAGGER =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
server.port=9090

# JWT Secret Key (minimal 256-bit / 32 karakter untuk HS256)
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# JWT Expiration (dalam milliseconds)
application.security.jwt.expiration=86400000

# Refresh Token Expiration (dalam milliseconds)
application.security.jwt.refresh-token.expiration=604800000

spring.application.name=absensi-app
spring.profiles.active=dev

# ? Aktifkan DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Optional - exclude folder yang tidak perlu di-watch
spring.devtools.restart.exclude=static/**,public/**,templates/**



